<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>匯率追蹤</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0a0f;
    --surface:   #111118;
    --surface2:  #1a1a24;
    --border:    #2a2a3a;
    --accent:    #c8ff00;
    --accent2:   #ff6b35;
    --accent3:   #00d4ff;
    --text:      #e8e8f0;
    --muted:     #666680;
    --usd:       #c8ff00;
    --jpy:       #ff6b35;
    --gold:      #ffd166;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── 背景紋理 ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(200,255,0,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(0,212,255,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* ── Header ── */
  header {
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .header-inner {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
  }

  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  h1 {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  h1 span {
    color: var(--accent);
  }

  .last-update {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  .update-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── 即時匯率卡片 ── */
  .rates-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .rate-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }

  .rate-card:hover {
    transform: translateY(-2px);
  }

  .rate-card.usd { border-top: 2px solid var(--usd); }
  .rate-card.jpy { border-top: 2px solid var(--jpy); }
  .rate-card.gold { border-top: 2px solid var(--gold); }

  .rate-card::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 80px; height: 80px;
    border-radius: 50%;
    opacity: 0.05;
    filter: blur(20px);
  }

  .rate-card.usd::after { background: var(--usd); }
  .rate-card.jpy::after { background: var(--jpy); }
  .rate-card.gold::after { background: var(--gold); }

  .rate-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .rate-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 400;
    letter-spacing: 0.05em;
  }

  .usd .rate-tag { background: rgba(200,255,0,0.1); color: var(--usd); }
  .jpy .rate-tag { background: rgba(255,107,53,0.1); color: var(--jpy); }
  .gold .rate-tag { background: rgba(255,209,102,0.1); color: var(--gold); }

  .rate-sell {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(26px, 3vw, 36px);
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 8px;
  }

  .usd .rate-sell { color: var(--usd); }
  .jpy .rate-sell { color: var(--jpy); }
  .gold .rate-sell { color: var(--gold); }

  .rate-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    gap: 16px;
  }

  .rate-buy-label { color: var(--muted); }

  /* ── 持有總覽 ── */
  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .holdings-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .holding-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
  }

  .holding-currency {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .holding-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }

  .holding-key {
    font-size: 12px;
    color: var(--muted);
  }

  .holding-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text);
  }

  .holding-avg {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .avg-label { font-size: 11px; color: var(--muted); font-family: 'Syne', sans-serif; }

  /* ── 主要內容區 ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 24px;
    margin-bottom: 32px;
  }

  /* ── 圖表區 ── */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }

  .chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .chart-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    padding: 4px;
    border-radius: 10px;
  }

  .chart-tab {
    padding: 6px 14px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }

  .chart-tab.active {
    background: var(--surface);
    color: var(--text);
  }

  .chart-tab.usd.active { color: var(--usd); }
  .chart-tab.jpy.active { color: var(--jpy); }
  .chart-tab.gold.active { color: var(--gold); }

  .days-tabs {
    display: flex;
    gap: 4px;
  }

  .days-tab {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }

  .days-tab.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,255,0,0.05);
  }

  .chart-wrap {
    position: relative;
    height: 260px;
  }

  .chart-empty {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 13px;
    display: none;
  }

  /* ── 換匯輸入表單 ── */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }

  .form-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 20px;
    letter-spacing: 0.02em;
  }

  .form-group {
    margin-bottom: 14px;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  select, input[type="text"], input[type="number"], input[type="date"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  select:focus, input:focus {
    border-color: var(--accent);
  }

  select option {
    background: var(--surface2);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .btn-submit {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.05em;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-submit:hover { opacity: 0.9; }
  .btn-submit:active { transform: scale(0.98); }

  .form-msg {
    font-size: 12px;
    margin-top: 10px;
    text-align: center;
    min-height: 18px;
    font-family: 'JetBrains Mono', monospace;
  }

  .form-msg.ok { color: var(--accent); }
  .form-msg.err { color: var(--accent2); }

  /* ── 換匯記錄表格 ── */
  .records-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 32px;
  }

  .records-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .filter-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    padding: 4px;
    border-radius: 10px;
  }

  .filter-tab {
    padding: 5px 12px;
    border-radius: 7px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }

  .filter-tab.active {
    background: var(--surface);
    color: var(--text);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
    padding: 0 12px 12px 0;
    border-bottom: 1px solid var(--border);
  }

  td {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 12px 12px 12px 0;
    border-bottom: 1px solid rgba(42,42,58,0.5);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }

  .currency-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
  }

  .badge-USD { background: rgba(200,255,0,0.1); color: var(--usd); }
  .badge-JPY { background: rgba(255,107,53,0.1); color: var(--jpy); }
  .badge-GOLD { background: rgba(255,209,102,0.1); color: var(--gold); }

  .btn-del {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-del:hover {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .empty-row td {
    text-align: center;
    color: var(--muted);
    padding: 32px 0;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
  }

  /* ── 通知設定 ── */
  .alerts-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 48px;
  }

  .alert-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
  }

  .alert-currency {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .alert-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .alert-key {
    font-size: 12px;
    color: var(--text);
  }

  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    cursor: pointer;
  }

  .toggle input { display: none; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 10px;
    transition: background 0.2s;
  }

  .toggle input:checked + .toggle-track {
    background: var(--accent);
  }

  .toggle-thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 14px;
    height: 14px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
  }

  .toggle input:checked ~ .toggle-thumb {
    transform: translateX(16px);
  }

  .target-input-wrap {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .target-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .target-row input {
    flex: 1;
    padding: 8px 10px;
    font-size: 12px;
  }

  .btn-save-target {
    padding: 8px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 11px;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.2s;
  }

  .btn-save-target:hover { border-color: var(--accent); color: var(--accent); }

  /* ── 響應式 ── */
  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
    .rates-grid, .holdings-grid, .alerts-grid { grid-template-columns: 1fr; }
  }

  /* ── 載入動畫 ── */
  .skeleton {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .loading-text {
    display: inline-block;
    width: 80px;
    height: 1em;
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header>
    <div class="header-inner">
      <div>
        <div class="logo">Personal Finance Tracker</div>
        <h1>匯率<span>追蹤</span></h1>
      </div>
      <div class="last-update">
        <div><span class="update-dot"></span>即時匯率</div>
        <div id="lastUpdateTime">—</div>
      </div>
    </div>
  </header>

  <!-- 即時匯率 -->
  <div class="section-title">即時牌告</div>
  <div class="rates-grid">
    <div class="rate-card usd">
      <div class="rate-label">美元 <span class="rate-tag">USD</span></div>
      <div class="rate-sell" id="usd-sell"><span class="skeleton loading-text"></span></div>
      <div class="rate-sub">
        <span class="rate-buy-label">買入</span>
        <span id="usd-buy"><span class="skeleton loading-text"></span></span>
      </div>
    </div>
    <div class="rate-card jpy">
      <div class="rate-label">日圓 <span class="rate-tag">JPY</span></div>
      <div class="rate-sell" id="jpy-sell"><span class="skeleton loading-text"></span></div>
      <div class="rate-sub">
        <span class="rate-buy-label">買入</span>
        <span id="jpy-buy"><span class="skeleton loading-text"></span></span>
      </div>
    </div>
    <div class="rate-card gold">
      <div class="rate-label">黃金存摺 <span class="rate-tag">GOLD</span></div>
      <div class="rate-sell" id="gold-sell"><span class="skeleton loading-text"></span></div>
      <div class="rate-sub">
        <span class="rate-buy-label">買入</span>
        <span id="gold-buy"><span class="skeleton loading-text"></span></span>
      </div>
    </div>
  </div>

  <!-- 持有總覽 -->
  <div class="section-title">持有總覽</div>
  <div class="holdings-grid" id="holdingsGrid">
    <div class="holding-card"><div class="holding-currency">USD</div><div style="color:var(--muted);font-size:13px;">尚無記錄</div></div>
    <div class="holding-card"><div class="holding-currency">JPY</div><div style="color:var(--muted);font-size:13px;">尚無記錄</div></div>
    <div class="holding-card"><div class="holding-currency">GOLD</div><div style="color:var(--muted);font-size:13px;">尚無記錄</div></div>
  </div>

  <!-- 圖表 + 輸入表單 -->
  <div class="main-grid">

    <!-- 走勢圖 -->
    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-tabs">
          <button class="chart-tab usd active" onclick="switchChart('USD', this)">USD</button>
          <button class="chart-tab jpy" onclick="switchChart('JPY', this)">JPY</button>
          <button class="chart-tab gold" onclick="switchChart('GOLD', this)">GOLD</button>
        </div>
        <div class="days-tabs">
          <button class="days-tab" onclick="switchDays(30, this)">30天</button>
          <button class="days-tab active" onclick="switchDays(180, this)">180天</button>
          <button class="days-tab" onclick="switchDays(365, this)">365天</button>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="rateChart"></canvas>
        <div class="chart-empty" id="chartEmpty">尚無足夠歷史資料</div>
      </div>
    </div>

    <!-- 換匯輸入 -->
    <div class="form-card">
      <div class="form-title">新增換匯記錄</div>

      <div class="form-group">
        <label>幣別</label>
        <select id="f-currency">
          <option value="USD">美元 USD</option>
          <option value="JPY">日圓 JPY</option>
          <option value="GOLD">黃金存摺 GOLD</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>台幣金額</label>
          <input type="number" id="f-twd" placeholder="50000" min="0" step="1">
        </div>
        <div class="form-group">
          <label>換得金額</label>
          <input type="number" id="f-foreign" placeholder="1570" min="0" step="0.0001">
        </div>
      </div>

      <div class="form-group">
        <label>成交匯率</label>
        <input type="number" id="f-rate" placeholder="31.85" min="0" step="0.0001">
      </div>

      <div class="form-group">
        <label>換匯日期</label>
        <input type="date" id="f-date">
      </div>

      <div class="form-group">
        <label>備註（選填）</label>
        <input type="text" id="f-note" placeholder="銀行臨櫃 / 網銀 ...">
      </div>

      <button class="btn-submit" onclick="submitRecord()">記錄換匯</button>
      <div class="form-msg" id="formMsg"></div>
    </div>
  </div>

  <!-- 換匯記錄 -->
  <div class="records-card">
    <div class="records-header">
      <div class="section-title" style="margin:0">換匯記錄</div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterRecords('ALL', this)">全部</button>
        <button class="filter-tab" onclick="filterRecords('USD', this)">USD</button>
        <button class="filter-tab" onclick="filterRecords('JPY', this)">JPY</button>
        <button class="filter-tab" onclick="filterRecords('GOLD', this)">GOLD</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>幣別</th>
          <th>台幣</th>
          <th>換得</th>
          <th>匯率</th>
          <th>備註</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="recordsBody">
        <tr class="empty-row"><td colspan="7">尚無換匯記錄</td></tr>
      </tbody>
    </table>
  </div>

  <!-- 通知設定 -->
  <div class="section-title">通知設定</div>
  <div class="alerts-grid" id="alertsGrid">
    <!-- 由 JS 生成 -->
  </div>

</div><!-- /container -->

<script>
// ── 狀態 ──────────────────────────────────────────
let currentChart = 'USD';
let currentDays  = 180;
let currentFilter = 'ALL';
let chartInstance = null;
let allRecords = [];

// ── 初始化 ────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // 預設今天日期
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];

  loadRates();
  loadHoldings();
  loadChart(currentChart, currentDays);
  loadRecords();
  loadAlerts();

  // 每 5 分鐘自動更新匯率
  setInterval(loadRates, 5 * 60 * 1000);
});

// ── 載入即時匯率 ──────────────────────────────────
async function loadRates() {
  try {
    const res = await fetch('/api/rates/latest');
    const data = await res.json();

    const currencies = { USD: ['usd-sell','usd-buy'], JPY: ['jpy-sell','jpy-buy'], GOLD: ['gold-sell','gold-buy'] };
    let latestTime = '—';

    for (const [code, [sellId, buyId]] of Object.entries(currencies)) {
      if (data[code]) {
        document.getElementById(sellId).textContent = formatRate(code, data[code].sell);
        document.getElementById(buyId).textContent  = formatRate(code, data[code].buy);
        latestTime = data[code].time;
      } else {
        document.getElementById(sellId).textContent = '—';
        document.getElementById(buyId).textContent  = '—';
      }
    }

    document.getElementById('lastUpdateTime').textContent = latestTime;
  } catch(e) {
    console.error('載入匯率失敗', e);
  }
}

function formatRate(currency, val) {
  if (currency === 'JPY') return val.toFixed(4);
  if (currency === 'GOLD') return val.toLocaleString('zh-TW', {minimumFractionDigits: 0});
  return val.toFixed(3);
}

// ── 載入持有總覽 ──────────────────────────────────
async function loadHoldings() {
  try {
    const res = await fetch('/api/holdings');
    const data = await res.json();
    const grid = document.getElementById('holdingsGrid');
    grid.innerHTML = '';

    for (const [code, info] of Object.entries(data)) {
      const unit = code === 'GOLD' ? 'g' : code;
      const avgStr = info.weighted_avg_rate
        ? formatRate(code, info.weighted_avg_rate)
        : '—';
      const foreignStr = info.total_foreign > 0
        ? `${info.total_foreign.toLocaleString('zh-TW')} ${unit}`
        : '—';
      const twdStr = info.total_twd > 0
        ? `NT$ ${info.total_twd.toLocaleString('zh-TW')}`
        : '—';

      grid.innerHTML += `
        <div class="holding-card">
          <div class="holding-currency">${code}</div>
          <div class="holding-row">
            <span class="holding-key">台幣投入</span>
            <span class="holding-val">${twdStr}</span>
          </div>
          <div class="holding-row">
            <span class="holding-key">持有</span>
            <span class="holding-val">${foreignStr}</span>
          </div>
          <div class="holding-avg">
            <span class="avg-label">加權平均匯率</span>
            <span>${avgStr}</span>
          </div>
        </div>`;
    }
  } catch(e) {
    console.error('載入持有總覽失敗', e);
  }
}

// ── 走勢圖 ────────────────────────────────────────
const chartColors = { USD: '#c8ff00', JPY: '#ff6b35', GOLD: '#ffd166' };

async function loadChart(currency, days) {
  try {
    const res = await fetch(`/api/rates/history/${currency}?days=${days}`);
    const data = await res.json();

    const empty = document.getElementById('chartEmpty');

    if (!data || data.length < 2) {
      empty.style.display = 'flex';
      if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
      return;
    }

    empty.style.display = 'none';
    const labels = data.map(d => d.time.split(' ')[0]);
    const sells  = data.map(d => d.sell);
    const buys   = data.map(d => d.buy);
    const color  = chartColors[currency];

    if (chartInstance) chartInstance.destroy();

    const ctx = document.getElementById('rateChart').getContext('2d');

    const grad = ctx.createLinearGradient(0, 0, 0, 260);
    grad.addColorStop(0, color + '22');
    grad.addColorStop(1, color + '00');

    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: '賣出',
            data: sells,
            borderColor: color,
            backgroundColor: grad,
            borderWidth: 2,
            pointRadius: 0,
            pointHoverRadius: 4,
            fill: true,
            tension: 0.3
          },
          {
            label: '買入',
            data: buys,
            borderColor: color + '66',
            backgroundColor: 'transparent',
            borderWidth: 1.5,
            pointRadius: 0,
            borderDash: [4, 4],
            fill: false,
            tension: 0.3
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            labels: {
              color: '#666680',
              font: { family: 'JetBrains Mono', size: 11 },
              boxWidth: 16
            }
          },
          tooltip: {
            backgroundColor: '#1a1a24',
            borderColor: '#2a2a3a',
            borderWidth: 1,
            titleColor: '#666680',
            bodyColor: '#e8e8f0',
            titleFont: { family: 'JetBrains Mono', size: 11 },
            bodyFont: { family: 'JetBrains Mono', size: 12 }
          }
        },
        scales: {
          x: {
            grid: { color: '#2a2a3a' },
            ticks: {
              color: '#666680',
              font: { family: 'JetBrains Mono', size: 10 },
              maxTicksLimit: 8,
              maxRotation: 0
            }
          },
          y: {
            grid: { color: '#2a2a3a' },
            ticks: {
              color: '#666680',
              font: { family: 'JetBrains Mono', size: 10 }
            }
          }
        }
      }
    });
  } catch(e) {
    console.error('載入圖表失敗', e);
  }
}

function switchChart(currency, btn) {
  currentChart = currency;
  document.querySelectorAll('.chart-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadChart(currency, currentDays);
}

function switchDays(days, btn) {
  currentDays = days;
  document.querySelectorAll('.days-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadChart(currentChart, days);
}

// ── 換匯記錄 ──────────────────────────────────────
async function loadRecords(currency = null) {
  try {
    const url = currency ? `/api/records?currency=${currency}` : '/api/records';
    const res = await fetch(url);
    allRecords = await res.json();
    renderRecords(allRecords);
  } catch(e) {
    console.error('載入記錄失敗', e);
  }
}

function renderRecords(records) {
  const tbody = document.getElementById('recordsBody');
  if (!records.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="7">尚無換匯記錄</td></tr>';
    return;
  }

  tbody.innerHTML = records.map(r => `
    <tr>
      <td>${r.exchanged_at}</td>
      <td><span class="currency-badge badge-${r.currency}">${r.currency}</span></td>
      <td>NT$ ${r.twd_amount.toLocaleString('zh-TW')}</td>
      <td>${r.foreign_amount.toLocaleString('zh-TW', {maximumFractionDigits: 4})}</td>
      <td>${r.rate_used}</td>
      <td style="color:var(--muted)">${r.note || '—'}</td>
      <td><button class="btn-del" onclick="deleteRecord(${r.id})">刪除</button></td>
    </tr>
  `).join('');
}

function filterRecords(currency, btn) {
  currentFilter = currency;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (currency === 'ALL') {
    renderRecords(allRecords);
  } else {
    renderRecords(allRecords.filter(r => r.currency === currency));
  }
}

async function deleteRecord(id) {
  if (!confirm('確定刪除這筆記錄？')) return;
  try {
    await fetch(`/api/records/${id}`, { method: 'DELETE' });
    await loadRecords();
    await loadHoldings();
  } catch(e) {
    console.error('刪除失敗', e);
  }
}

// ── 新增換匯記錄 ──────────────────────────────────
async function submitRecord() {
  const msg = document.getElementById('formMsg');
  const currency = document.getElementById('f-currency').value;
  const twd      = parseFloat(document.getElementById('f-twd').value);
  const foreign  = parseFloat(document.getElementById('f-foreign').value);
  const rate     = parseFloat(document.getElementById('f-rate').value);
  const date     = document.getElementById('f-date').value;
  const note     = document.getElementById('f-note').value;

  if (!twd || !foreign || !rate || !date) {
    msg.className = 'form-msg err';
    msg.textContent = '請填寫所有必填欄位';
    return;
  }

  try {
    const res = await fetch('/api/records', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        currency, twd_amount: twd, foreign_amount: foreign,
        rate_used: rate, exchanged_at: date, note
      })
    });

    if (res.ok) {
      msg.className = 'form-msg ok';
      msg.textContent = '✓ 記錄已儲存';
      document.getElementById('f-twd').value = '';
      document.getElementById('f-foreign').value = '';
      document.getElementById('f-rate').value = '';
      document.getElementById('f-note').value = '';
      await loadRecords();
      await loadHoldings();
      setTimeout(() => msg.textContent = '', 3000);
    } else {
      const err = await res.json();
      msg.className = 'form-msg err';
      msg.textContent = err.error || '儲存失敗';
    }
  } catch(e) {
    msg.className = 'form-msg err';
    msg.textContent = '連線失敗';
  }
}

// ── 通知設定 ──────────────────────────────────────
async function loadAlerts() {
  const grid = document.getElementById('alertsGrid');
  grid.innerHTML = '';

  for (const currency of ['USD', 'JPY', 'GOLD']) {
    try {
      const res = await fetch(`/api/alerts/${currency}`);
      const s = await res.json();

      grid.innerHTML += `
        <div class="alert-card">
          <div class="alert-currency">${currency} 通知設定</div>

          <div class="alert-row">
            <span class="alert-key">3 個月低點</span>
            <label class="toggle">
              <input type="checkbox" ${s.alert_3m_low ? 'checked' : ''}
                onchange="updateAlert('${currency}', 'alert_3m_low', this.checked)">
              <div class="toggle-track"></div>
              <div class="toggle-thumb"></div>
            </label>
          </div>

          <div class="alert-row">
            <span class="alert-key">半年低點</span>
            <label class="toggle">
              <input type="checkbox" ${s.alert_6m_low ? 'checked' : ''}
                onchange="updateAlert('${currency}', 'alert_6m_low', this.checked)">
              <div class="toggle-track"></div>
              <div class="toggle-thumb"></div>
            </label>
          </div>

          <div class="alert-row">
            <span class="alert-key">低於加權平均</span>
            <label class="toggle">
              <input type="checkbox" ${s.alert_below_avg ? 'checked' : ''}
                onchange="updateAlert('${currency}', 'alert_below_avg', this.checked)">
              <div class="toggle-track"></div>
              <div class="toggle-thumb"></div>
            </label>
          </div>

          <div class="target-input-wrap">
            <label>目標匯率</label>
            <div class="target-row">
              <input type="number" id="target-${currency}"
                value="${s.target_rate || ''}"
                placeholder="未設定" step="0.0001" min="0">
              <button class="btn-save-target"
                onclick="saveTarget('${currency}')">儲存</button>
            </div>
          </div>
        </div>`;
    } catch(e) {
      console.error(`載入 ${currency} 通知設定失敗`, e);
    }
  }
}

async function updateAlert(currency, field, value) {
  await fetch(`/api/alerts/${currency}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ [field]: value })
  });
}

async function saveTarget(currency) {
  const val = parseFloat(document.getElementById(`target-${currency}`).value);
  await fetch(`/api/alerts/${currency}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ target_rate: isNaN(val) ? null : val })
  });
}
</script>
</body>
</html>
